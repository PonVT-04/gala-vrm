<!DOCTYPE html>
<html>
<head>
    <title>Gala VRM</title>
    <style>
        body { margin: 0; background: #1a1a2e; }
        canvas { display: block; }
        #chat { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; }
        #input { width: 70%; padding: 10px; border-radius: 20px; border: none; }
        #btn { padding: 10px 20px; border-radius: 20px; border: none; background: #8b5cf6; color: white; cursor: pointer; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.8/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="chat">
        <input id="input" placeholder="Hablale a Gala...">
        <button id="btn">Enviar</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        // URL de tu Space de HF. Reemplazá PonVT por tu usuario si es distinto.
        const HF_SPACE_URL = "https://ponvt-galaxy-ai.hf.space";

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 1.5);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(1, 1, 1);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        let currentVrm;
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));
        loader.load('./gala.vrm', (gltf) => {
            currentVrm = gltf.userData.vrm;
            scene.add(currentVrm.scene);
            currentVrm.scene.rotation.y = Math.PI; // Que mire a la cámara
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) currentVrm.update(delta);
            renderer.render(scene, camera);
        }
        animate();

        // Chat con el backend de HF
        document.getElementById('btn').onclick = async () => {
            const input = document.getElementById('input');
            const msg = input.value;
            if (!msg) return;
            input.value = "Gala está pensando...";

            try {
                const res = await fetch(${HF_SPACE_URL}/run/predict, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ data: [msg, []] })
                });
                const data = await res.json();
                const respuesta = data.data[0];
                input.value = "";
                // Acá después le metemos lipsync. Por ahora solo log.
                console.log("Gala:", respuesta);
                // Simple blink para que no quede quieta
                if (currentVrm) currentVrm.expressionManager.setValue('blink', 1.0);
                setTimeout(() => { if (currentVrm) currentVrm.expressionManager.setValue('blink', 0.0); }, 200);

            } catch (e) {
                input.value = "Error: No pude hablar con el cerebro de Gala :(";
            }
        };
    </script>
</body>
</html>
